{% extends 'wk_base.html' %}
{% block wk_base %}

<style>
    .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
    }
    
    .calendar-day-cell {
        aspect-ratio: 1 / 1.1;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @media (min-width: 1024px) {
        .calendar-day-cell {
            aspect-ratio: auto;
            min-height: 120px;
        }
    }

    .event-pill {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-size: 0.65rem;
        line-height: 1rem;
        padding: 0.125rem 0.5rem;
        border-radius: 9999px;
        margin-top: 0.25rem;
        font-weight: 600;
        max-width: 100%;
        display: block;
    }

    .holiday-pill {
        background-color: #f0f9ff;
        color: #0369a1;
        border: 1px solid #bae6fd;
    }

    .leave-approved-pill {
        background-color: #f0fdf4;
        color: #15803d;
        border: 1px solid #bbf7d0;
    }

    .leave-rejected-pill {
        background-color: #fef2f2;
        color: #b91c1c;
        border: 1px solid #fecaca;
    }

    .today-marker {
        background-color: #10182B;
        color: white !important;
    }

    .other-month {
        background-color: #f8fafc;
        opacity: 0.5;
    }

    /* Animation for month transition */
    @keyframes fadeInScale {
        from { opacity: 0; transform: scale(0.98); }
        to { opacity: 1; transform: scale(1); }
    }
    .calendar-animate {
        animation: fadeInScale 0.3s ease-out forwards;
    }
</style>

<main class="p-4 sm:p-6 lg:p-8 bg-slate-50 min-h-[calc(100vh-4rem)]">
    <div class="max-w-[1600px] mx-auto space-y-6">
        
        <!-- Header Section -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-white rounded-2xl shadow-sm border border-slate-200">
                    <i class="fa-solid fa-calendar-days text-[#10182B] text-xl"></i>
                </div>
                <div>
                    <h1 id="monthLabel" class="text-2xl font-bold text-slate-900 tracking-tight">Month Year</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="inline-flex h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                        <p class="text-sm text-slate-500 font-medium">Your work schedule is up to date</p>
                    </div>
                </div>
            </div>

            <div class="flex items-center bg-white p-1.5 rounded-2xl shadow-sm border border-slate-200 gap-1">
                <button id="prevMonth" class="p-2 hover:bg-slate-50 rounded-xl transition-colors text-slate-600 hover:text-slate-900">
                    <i class="fa-solid fa-chevron-left text-sm"></i>
                </button>
                <button id="todayBtn" class="px-4 py-2 text-sm font-bold text-slate-700 hover:bg-slate-50 rounded-xl transition-colors">
                    Today
                </button>
                <button id="nextMonth" class="p-2 hover:bg-slate-50 rounded-xl transition-colors text-slate-600 hover:text-slate-900">
                    <i class="fa-solid fa-chevron-right text-sm"></i>
                </button>
            </div>
        </div>

        <!-- Legend -->
        <div class="flex flex-wrap gap-4 items-center px-2">
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-sky-100 border border-sky-400"></span>
                <span class="text-xs font-semibold text-slate-600">Company Holiday</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-emerald-100 border border-emerald-400"></span>
                <span class="text-xs font-semibold text-slate-600">Approved Leave</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="h-3 w-3 rounded-full bg-rose-100 border border-rose-400"></span>
                <span class="text-xs font-semibold text-slate-600">Rejected Leave</span>
            </div>
        </div>

        <!-- Calendar Container -->
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100/40 border border-slate-100 overflow-hidden relative">
            <div class="absolute inset-x-0 top-0 h-1 bg-[#10182B]"></div>
            
            <!-- Days of Week -->
            <div class="calendar-grid border-b border-slate-100 bg-slate-50/50">
                <div class="py-4 text-center">
                    <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">Sun</span>
                </div>
                <div class="py-4 text-center">
                    <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">Mon</span>
                </div>
                <div class="py-4 text-center">
                    <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">Tue</span>
                </div>
                <div class="py-4 text-center">
                    <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">Wed</span>
                </div>
                <div class="py-4 text-center">
                    <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">Thu</span>
                </div>
                <div class="py-4 text-center">
                    <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">Fri</span>
                </div>
                <div class="py-4 text-center">
                    <span class="text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">Sat</span>
                </div>
            </div>

            <!-- Calendar Days -->
            <div id="calendarDays" class="calendar-grid divide-x divide-y divide-slate-100 calendar-animate">
                <!-- Days injected by JS -->
            </div>

            <!-- Empty State Overlay (Optional) -->
            <div id="calendarLoader" class="absolute inset-0 bg-white/60 backdrop-blur-[2px] hidden items-center justify-center z-10">
                <div class="flex flex-col items-center gap-3">
                    <div class="h-10 w-10 border-4 border-slate-200 border-t-[#10182B] rounded-full animate-spin"></div>
                    <span class="text-sm font-bold text-slate-800 tracking-tight">Syncing Schedule...</span>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    let currentDate = new Date();
    const calendarDays = document.getElementById('calendarDays');
    const monthLabelEl = document.getElementById('monthLabel');
    const prevMonthBtn = document.getElementById('prevMonth');
    const nextMonthBtn = document.getElementById('nextMonth');
    const todayBtn = document.getElementById('todayBtn');
    const loader = document.getElementById('calendarLoader');
    
    const currentWorkerName = '{{ worker.name }}';
    const holidaysByDate = new Map();
    const leavesByDate = new Map();

    function showCalLoader() { loader?.classList.remove('hidden'); loader?.classList.add('flex'); }
    function hideCalLoader() { loader?.classList.add('hidden'); loader?.classList.remove('flex'); }

    async function loadHolidays(year, monthIndex) {
        const month = monthIndex + 1;
        try {
            const res = await fetch(`/workers/api/holidays?year=${year}&month=${month}`);
            if (res.ok) {
                const data = await res.json();
                holidaysByDate.clear();
                (data.holidays || []).forEach(h => {
                    holidaysByDate.set(h.date, h);
                });
            }
        } catch (e) { console.error("Error loading holidays:", e); }
    }

    async function loadLeaves(year, monthIndex) {
        const month = monthIndex + 1;
        try {
            const res = await fetch(`/workers/api/leaves?year=${year}&month=${month}`);
            if (res.ok) {
                const data = await res.json();
                leavesByDate.clear();
                (data.leaves || []).forEach(l => {
                    leavesByDate.set(l.date, l);
                });
            }
        } catch (e) { console.error("Error loading leaves:", e); }
    }

    async function renderCalendar() {
        showCalLoader();
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                          'July', 'August', 'September', 'October', 'November', 'December'];
        
        // Month transition animation
        calendarDays.classList.remove('calendar-animate');
        void calendarDays.offsetWidth; // Trigger reflow
        calendarDays.classList.add('calendar-animate');

        monthLabelEl.textContent = `${monthNames[month]} ${year}`;

        await Promise.all([loadHolidays(year, month), loadLeaves(year, month)]);

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrevMonth = new Date(year, month, 0).getDate();
        
        const today = new Date();
        const isCurrentMonth = today.getMonth() === month && today.getFullYear() === year;
        const todayDate = today.getDate();

        calendarDays.innerHTML = '';

        // Previous month days
        for (let i = firstDay - 1; i >= 0; i--) {
            const day = daysInPrevMonth - i;
            const dayEl = createDayElement(day, 'prev');
            calendarDays.appendChild(dayEl);
        }

        // Current month days
        for (let day = 1; day <= daysInMonth; day++) {
            const isToday = isCurrentMonth && day === todayDate;
            const dayEl = createDayElement(day, 'current', isToday);
            calendarDays.appendChild(dayEl);
        }

        // Next month days
        const totalCells = calendarDays.children.length;
        const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (let day = 1; day <= remainingCells; day++) {
            const dayEl = createDayElement(day, 'next');
            calendarDays.appendChild(dayEl);
        }
        hideCalLoader();
    }

    function createDayElement(day, type, isToday = false) {
        const dayEl = document.createElement('div');
        dayEl.className = `calendar-day-cell p-2 sm:p-4 flex flex-col gap-1 transition-all duration-300 hover:bg-slate-50/80 group cursor-default`;
        
        if (type !== 'current') {
            dayEl.classList.add('other-month');
        }

        const header = document.createElement('div');
        header.className = 'flex items-start justify-between';
        
        const numberSpan = document.createElement('span');
        numberSpan.className = `text-sm font-bold w-8 h-8 flex items-center justify-center rounded-xl transition-colors ${type === 'current' ? 'text-slate-800' : 'text-slate-300'}`;
        if (isToday) {
            numberSpan.classList.add('today-marker');
            numberSpan.classList.remove('text-slate-800');
        }
        numberSpan.textContent = day;
        header.appendChild(numberSpan);
        dayEl.appendChild(header);

        if (type === 'current') {
            const dateStr = `${currentDate.getFullYear()}-${String(currentDate.getMonth()+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            
            // Events Container
            const eventsCont = document.createElement('div');
            eventsCont.className = 'flex flex-col gap-1 mt-auto';
            
            // Leave Info
            const leave = leavesByDate.get(dateStr);
            if (leave) {
                const pill = document.createElement('span');
                const status = (leave.status || '').toLowerCase();
                const wn = leave.worker_name || leave.workerName || leave.worker || '';
                const isMine = (currentWorkerName && wn && wn === currentWorkerName);
                
                pill.className = `event-pill ${status === 'approved' ? 'leave-approved-pill' : 'leave-rejected-pill'}`;
                pill.textContent = isMine ? 'My Leave' : (wn ? `${wn}'s Leave` : 'Leave');
                pill.title = pill.textContent;
                eventsCont.appendChild(pill);
            }

            // Holiday Info
            if (holidaysByDate.has(dateStr)) {
                const h = holidaysByDate.get(dateStr);
                const pill = document.createElement('span');
                pill.className = 'event-pill holiday-pill';
                pill.textContent = (h && (h.name || h.title || h.holiday)) ? (h.name || h.title || h.holiday) : 'Holiday';
                pill.title = pill.textContent;
                eventsCont.appendChild(pill);
            }
            
            dayEl.appendChild(eventsCont);
        }

        return dayEl;
    }

    prevMonthBtn.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    });

    nextMonthBtn.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    });

    todayBtn.addEventListener('click', () => {
        currentDate = new Date();
        renderCalendar();
    });

    // Initial render
    renderCalendar();

    // WebSocket Listeners
    (function initWebSockets() {
        try {
            const loc = window.location;
            const scheme = loc.protocol === 'https:' ? 'wss' : 'ws';
            
            // Holiday WebSocket
            const holidaySocket = new WebSocket(`${scheme}://${loc.host}/ws/holidays/`);
            holidaySocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const yr = currentDate.getFullYear();
                const mo = currentDate.getMonth() + 1;
                const isForCurrent = (ds) => ds && ds.startsWith(`${yr}-${String(mo).padStart(2,'0')}`);
                
                if (['holiday_added', 'holiday_updated', 'holiday_deleted'].includes(data.type)) {
                    renderCalendar();
                }
            };

            // Leave WebSocket
            const leaveSocket = new WebSocket(`${scheme}://${loc.host}/ws/leaves/`);
            leaveSocket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                const wid = {{ worker.id }};
                if (['leave_added', 'leave_updated', 'leave_deleted'].includes(data.type)) {
                    if (Number(data.worker_id) === Number(wid) || (data.leave && Number(data.leave.worker_id) === Number(wid))) {
                        renderCalendar();
                    }
                }
            };
        } catch (e) { console.error("WebSocket initialization failed:", e); }
    })();
</script>

{% endblock wk_base %}
