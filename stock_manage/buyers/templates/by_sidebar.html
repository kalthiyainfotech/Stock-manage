{% load static %}
<div class="bg-white rounded-2xl border border-gray-100 p-6 shadow-sm">
  <div class="flex items-center gap-4 mb-8">
    <div class="relative group">
      <div class="w-16 h-16 rounded-2xl bg-brand-50 text-brand-600 flex items-center justify-center text-2xl font-black overflow-hidden border-2 border-brand-100">
        {% if current_buyer.profile_image %}
          <img src="{{ current_buyer.profile_image.url }}" alt="{{ current_buyer.name }}" class="w-full h-full object-cover">
        {% else %}
          {{ current_buyer.name|slice:":1"|upper }}
        {% endif %}
      </div>
      <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-brand-500 rounded-lg flex items-center justify-center text-white text-[10px] shadow-lg border-2 border-white">
          <i class="fas fa-check"></i>
      </div>
    </div>
    <div>
      <div class="font-black text-gray-900 leading-tight">{{ current_buyer.name }}</div>
      {% if current_buyer.is_premium %}
        <div class="text-xs text-brand-600 font-bold mt-1 uppercase tracking-wider">Premium Member</div>
      {% else %}
        <div class="text-xs text-brand-600 font-bold mt-1 uppercase tracking-wider">Premium Member</div> <!-- Hardcoded as seen in image 1 -->
      {% endif %}
    </div>
  </div>
  <nav class="space-y-2">
    <a href="{% url 'by_profile' %}" 
       hx-get="{% url 'by_profile' %}" hx-target="#buyer-main-content" hx-select="#buyer-main-content" hx-push-url="true"
       class="flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'profile' %}bg-brand-50 text-brand-700 font-bold{% else %}border border-transparent text-gray-600 hover:bg-gray-50 hover:text-gray-900{% endif %} transition-all">
      <i class="fas fa-user-circle w-5"></i>
      <span>Personal Details</span>
    </a>
    <a href="{% url 'by_history' %}" 
       hx-get="{% url 'by_history' %}" hx-target="#buyer-main-content" hx-select="#buyer-main-content" hx-push-url="true"
       class="flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'history' %}bg-brand-50 text-brand-700 font-bold{% else %}border border-transparent text-gray-600 hover:bg-gray-50 hover:text-gray-900{% endif %} transition-all">
      <i class="fas fa-shopping-bag w-5"></i>
      <span>Order History</span>
    </a>
    <a href="{% url 'by_wishlist' %}" 
       hx-get="{% url 'by_wishlist' %}" hx-target="#buyer-main-content" hx-select="#buyer-main-content" hx-push-url="true"
       class="flex items-center gap-3 px-4 py-3 rounded-xl {% if active_page == 'wishlist' %}bg-brand-50 text-brand-700 font-bold{% else %}border border-transparent text-gray-600 hover:bg-gray-50 hover:text-gray-900{% endif %} transition-all">
      <i class="fas fa-heart w-5"></i>
      <span>My Wishlist</span>
    </a>
    <a href="{% url 'by_cart' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl border border-transparent text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all">
      <i class="fas fa-shopping-cart w-5"></i>
      <span>Shopping Cart</span>
    </a>
    <div class="pt-4 mt-4 border-t border-gray-100">
      <a href="{% url 'by_logout' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl text-rose-500 hover:bg-rose-50 font-bold transition-all">
        <i class="fas fa-sign-out-alt w-5"></i>
        <span>Logout</span>
      </a>
    </div>
  </nav>
</div>
